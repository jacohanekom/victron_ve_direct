; ╔══════════════════════════════════════════════════════════╗
; ║     victron_ve_direct  –  configuration file            ║
; ╚══════════════════════════════════════════════════════════╝

; ── Device ─────────────────────────────────────────────────
[device]
; Linux (Raspberry Pi):  /dev/ttyUSB0  or  /dev/ttyACM0
; macOS:                 /dev/tty.usbserial-XXXXXXXX
port        = /dev/ttyUSB0
baud        = 19200         ; VE.Direct is always 19200 8N1
retry_secs  = 5             ; seconds to wait before reconnect after disconnect

; ── Output ──────────────────────────────────────────────────
[output]
ctrl_port   = 8562          ; status   : echo status | nc 127.0.0.1 8562
data_port   = 8563          ; stream   : nc 127.0.0.1 8563

; ── Control ─────────────────────────────────────────────────
[control]
; Allow writing device settings (set/setraw/restart) over the ctrl_port.
; Reads (status/settings/get/list/ping) are always allowed.
; NOTE: the ctrl_port listens on 0.0.0.0 — anyone on your LAN who can reach
; it can change charger settings when this is true. Set false to lock down.
allow_set   = true

; ── mDNS / DNS-SD discovery ───────────────────────────────────
[mdns]
enabled     = true                ; announce _victron-data._tcp / _victron-status._tcp via avahi-daemon
name        = victron-ve-direct   ; service instance name shown in discovery
